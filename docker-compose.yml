services:
  client:
    build:
      context: ./client
      args:
        - VITE_WS_URL=http://localhost:8888
        - VITE_BOTS=true
        - VITE_MAX_NUMBER_BOTS=10
    ports:
      - "80:80"
    depends_on:
      - websocket

  websocket:
    build: ./webSocket
    ports:
      - "8888:8888"
    environment:
      - PORT=8888
      - MAX_NUMBER_BOTS=10
      - BOT_SERVICE_URL=http://bot:8886
    depends_on:
      - bot

  bot:
    build: ./bot
    ports:
      - "8886:8886"
    environment:
      - PORT=8886
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"
