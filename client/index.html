<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YayPoker - Texas Hold'em with Friends</title>
    
    <!-- CSS for local font optimization -->
    <style>
      :root {
        /* Pilas de fuentes del sistema que imitan las originales */
        --font-display: 'Impact', 'Haettenschweiler', 'Arial Narrow Bold', sans-serif;
        --font-sans: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace;
      }

      body {
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
        background-color: #050505;
        color: #ffffff;
      }

      /* Utilidades para los componentes */
      .font-bebas { font-family: var(--font-display); text-transform: uppercase; letter-spacing: 0.05em; }
      .font-mono { font-family: var(--font-mono); }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
