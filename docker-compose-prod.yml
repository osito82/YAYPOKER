services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8888:8888"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - websocket

  client:
    build:
      context: ./client
      args:
        - VITE_BOTS=true
        - VITE_MAX_NUMBER_BOTS=4
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - websocket
    volumes:
      - ./Logs:/usr/share/nginx/html/Logs

  websocket:
    build:
      context: ./webSocket
    restart: unless-stopped
    expose:
      - "8888"
    environment:
      - NODE_ENV=production
      - PORT=8888
      - VITE_WS_URL=websocket # Crucial para que el bot sepa a dónde conectarse internamente
      - VITE_WS_PORT=8888
      - MAX_NUMBER_BOTS=4
      - BOT_SERVICE_URL=http://bot:8886
    depends_on:
      - bot
    volumes:
      - ./Logs:/Logs

  bot:
    build:
      context: ./bot
    restart: unless-stopped
    expose:
      - "8886"
    environment:
      - NODE_ENV=production
      - PORT=8886
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_URL=http://host.docker.internal:11434
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - DEFAULT_AI_PROVIDER=deepseek
      - DEFAULT_AI_MODEL=deepseek-chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Logs:/Logs

volumes:
  caddy_data:
  caddy_config:
