services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client
      - websocket

  client:
    build:
      context: ./client
      args:
        - VITE_WS_PORT=443
        - VITE_WS_URL=ws.yaypoker.com
        - VITE_BOTS=false
        - VITE_MAX_NUMBER_BOTS=0
    restart: unless-stopped
    depends_on:
      - websocket
    volumes:
      - ./Logs:/usr/share/nginx/html/Logs

  websocket:
    build: ./webSocket
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8888
      - VITE_WS_URL=websocket
      - VITE_WS_PORT=8888
      - MAX_NUMBER_BOTS=10
      - BOT_SERVICE_URL=http://bot:8886
    depends_on:
      - bot
    volumes:
      - ./Logs:/Logs

  bot:
    build: ./bot
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=8886
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OLLAMA_URL=73.7.52.167:11434
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - DEFAULT_AI_PROVIDER=deepseek
      - DEFAULT_AI_MODEL=deepseek-chat
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Logs:/Logs

volumes:
  caddy_data:
  caddy_config:

