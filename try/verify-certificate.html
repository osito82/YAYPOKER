<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deush Poker — Verificador de Certificados</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #D4A853;
    --gold-light: #F5D78E;
    --gold-dim: #8A6A2A;
    --felt: #0D1F0F;
    --felt-mid: #142A16;
    --felt-light: #1E3D20;
    --green-ok: #27AE60;
    --green-ok-dim: #1A7A42;
    --red-err: #C0392B;
    --white: #F5F0E8;
    --dim: #7A7268;
    --dark: #060E07;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(212,168,83,0.05) 0%, transparent 60%),
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.01) 2px,
        rgba(255,255,255,0.01) 4px
      );
    z-index: 0;
  }

  .page {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 520px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  /* Header */
  .header {
    text-align: center;
    animation: fade-down 0.5s both;
  }
  @keyframes fade-down {
    from { opacity: 0; transform: translateY(-16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .logo-mark {
    font-size: 36px;
    margin-bottom: 8px;
    display: block;
  }
  .site-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 4px;
    color: var(--gold-dim);
    text-transform: uppercase;
    margin-bottom: 12px;
  }
  .page-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(36px, 8vw, 52px);
    letter-spacing: 2px;
    background: linear-gradient(135deg, var(--gold-light), var(--gold));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .page-sub {
    font-size: 13px;
    color: var(--dim);
    margin-top: 4px;
    line-height: 1.5;
  }

  /* Input card */
  .input-card {
    width: 100%;
    background: var(--felt-mid);
    border: 1px solid rgba(212,168,83,0.2);
    border-radius: 16px;
    padding: 28px;
    animation: fade-up 0.5s 0.1s both;
  }
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .field-group {
    margin-bottom: 20px;
  }
  .field-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
    margin-bottom: 8px;
  }
  .field-input {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 1px;
  }
  .field-input::placeholder { color: rgba(255,255,255,0.2); }
  .field-input:focus {
    border-color: rgba(212,168,83,0.5);
    box-shadow: 0 0 0 3px rgba(212,168,83,0.08);
  }

  /* 4-digit code input */
  .code-input-row {
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
  }
  .digit-input {
    width: 64px;
    height: 76px;
    background: rgba(0,0,0,0.5);
    border: 2px solid rgba(255,255,255,0.12);
    border-radius: 12px;
    text-align: center;
    color: var(--gold-light);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    outline: none;
    transition: all 0.2s;
    caret-color: var(--gold);
  }
  .digit-input:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(212,168,83,0.12), 0 4px 20px rgba(0,0,0,0.5);
    background: rgba(212,168,83,0.05);
  }
  .digit-input.filled {
    border-color: rgba(212,168,83,0.4);
  }
  .code-sep {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    color: var(--gold-dim);
    opacity: 0.4;
    margin: 0 2px;
  }

  /* Verify button */
  .verify-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dim) 100%);
    border: none;
    border-radius: 10px;
    color: var(--dark);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }
  .verify-btn::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.4s;
  }
  .verify-btn:hover::before { left: 100%; }
  .verify-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(212,168,83,0.3);
  }
  .verify-btn:active { transform: translateY(0); }
  .verify-btn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* Result panel */
  .result-panel {
    width: 100%;
    border-radius: 16px;
    padding: 24px 28px;
    animation: result-pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    display: none;
  }
  @keyframes result-pop {
    from { transform: scale(0.9); opacity: 0; }
    to   { transform: scale(1);   opacity: 1; }
  }
  .result-panel.valid {
    display: block;
    background: linear-gradient(135deg, rgba(39,174,96,0.15) 0%, rgba(39,174,96,0.05) 100%);
    border: 1px solid rgba(39,174,96,0.4);
  }
  .result-panel.invalid {
    display: block;
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.3);
  }

  .result-icon {
    font-size: 40px;
    display: block;
    margin-bottom: 12px;
  }
  .result-status {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    margin-bottom: 4px;
  }
  .result-panel.valid .result-status { color: var(--green-ok); }
  .result-panel.invalid .result-status { color: var(--red-err); }

  .result-msg {
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 16px;
    line-height: 1.5;
  }

  /* Winner detail in result */
  .winner-detail {
    background: rgba(0,0,0,0.3);
    border-radius: 10px;
    padding: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .detail-item {}
  .detail-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--dim);
    margin-bottom: 2px;
  }
  .detail-value {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--white);
    font-weight: 500;
  }
  .detail-item.full { grid-column: 1 / -1; }
  .detail-value.name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 24px;
    color: var(--gold-light);
    letter-spacing: 1px;
  }

  /* Seal */
  .seal {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 12px;
    padding: 6px 14px;
    background: rgba(39,174,96,0.1);
    border: 1px solid rgba(39,174,96,0.3);
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--green-ok);
  }
  .seal-dot {
    width: 6px;
    height: 6px;
    background: var(--green-ok);
    border-radius: 50%;
  }

  /* Try again */
  .try-again {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    color: var(--dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    padding: 8px 16px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 12px;
    display: none;
  }
  .try-again:hover { border-color: rgba(255,255,255,0.3); color: var(--white); }

  /* Footer */
  .footer {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--gold-dim);
    opacity: 0.5;
    text-align: center;
  }

  /* Divider */
  .divider {
    width: 40px;
    height: 1px;
    background: rgba(212,168,83,0.3);
    margin: 0 auto;
  }
</style>
</head>
<body>

<div class="page">

  <!-- Header -->
  <div class="header">
    <span class="logo-mark">🃏</span>
    <p class="site-name">Deush Poker</p>
    <h1 class="page-title">VERIFICADOR</h1>
    <p class="page-sub">Ingresa el ID del torneo y el código de 4 dígitos<br>para confirmar la identidad del ganador</p>
  </div>

  <div class="divider"></div>

  <!-- Input card -->
  <div class="input-card" id="inputCard">
    <div class="field-group">
      <label class="field-label" for="torneoInput">ID del Torneo</label>
      <input
        class="field-input"
        id="torneoInput"
        type="text"
        placeholder="ej: abc1-9f3d"
        autocomplete="off"
        spellcheck="false"
      >
    </div>

    <div class="field-group">
      <label class="field-label">Código del Ganador (4 dígitos)</label>
      <div class="code-input-row">
        <input class="digit-input" id="c0" type="text" inputmode="numeric" maxlength="1">
        <input class="digit-input" id="c1" type="text" inputmode="numeric" maxlength="1">
        <span class="code-sep">·</span>
        <input class="digit-input" id="c2" type="text" inputmode="numeric" maxlength="1">
        <input class="digit-input" id="c3" type="text" inputmode="numeric" maxlength="1">
      </div>
    </div>

    <button class="verify-btn" id="verifyBtn" onclick="verify()">
      VERIFICAR CERTIFICADO
    </button>
  </div>

  <!-- Result panel -->
  <div class="result-panel" id="resultPanel">
    <span class="result-icon" id="resultIcon"></span>
    <p class="result-status" id="resultStatus"></p>
    <p class="result-msg" id="resultMsg"></p>
    <div class="winner-detail" id="winnerDetail" style="display:none;">
      <div class="detail-item full">
        <p class="detail-label">Ganador del Torneo</p>
        <p class="detail-value name" id="rName">—</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">Torneo ID</p>
        <p class="detail-value" id="rTorneo">—</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">Fecha</p>
        <p class="detail-value" id="rDate">—</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">Jugadores</p>
        <p class="detail-value" id="rPlayers">—</p>
      </div>
      <div class="detail-item">
        <p class="detail-label">Fichas Finales</p>
        <p class="detail-value" id="rChips">—</p>
      </div>
    </div>
    <div id="sealWrap"></div>
    <br>
    <button class="try-again" id="tryAgainBtn" onclick="reset()">← VERIFICAR OTRO</button>
  </div>

  <div class="footer">SISTEMA DE CERTIFICACIÓN OFICIAL · DEUSH POKER v1.0</div>

</div>

<script>
  // ─── Digit input UX ─────────────────────────────────────────────
  const digits = [
    document.getElementById('c0'),
    document.getElementById('c1'),
    document.getElementById('c2'),
    document.getElementById('c3'),
  ]

  digits.forEach((inp, i) => {
    inp.addEventListener('input', (e) => {
      const val = e.target.value.replace(/\D/g, '')
      inp.value = val
      if (val) {
        inp.classList.add('filled')
        if (i < 3) digits[i + 1].focus()
      } else {
        inp.classList.remove('filled')
      }
    })
    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !inp.value && i > 0) {
        digits[i - 1].focus()
        digits[i - 1].value = ''
        digits[i - 1].classList.remove('filled')
      }
      if (e.key === 'Enter') verify()
    })
    inp.addEventListener('paste', (e) => {
      e.preventDefault()
      const pasted = (e.clipboardData.getData('text') || '').replace(/\D/g, '').slice(0, 4)
      for (let j = 0; j < 4; j++) {
        digits[j].value = pasted[j] || ''
        digits[j].classList.toggle('filled', !!pasted[j])
      }
      if (pasted.length === 4) verify()
    })
  })

  // ─── Verify logic ────────────────────────────────────────────────
  async function verify() {
    const torneoId = document.getElementById('torneoInput').value.trim()
    const code = digits.map(d => d.value).join('')

    if (!torneoId) {
      shake(document.getElementById('torneoInput'))
      return
    }
    if (code.length < 4) {
      digits.forEach(d => { if (!d.value) shake(d) })
      return
    }

    const btn = document.getElementById('verifyBtn')
    btn.disabled = true
    btn.textContent = 'VERIFICANDO...'

    // Call the backend endpoint
    // In production: GET /verify/:torneoId/:code
    try {
      const result = await fetchVerification(torneoId, code)
      showResult(result, torneoId, code)
    } catch (err) {
      showResult({ valid: false, error: 'No se pudo conectar al servidor.' }, torneoId, code)
    }

    btn.disabled = false
    btn.textContent = 'VERIFICAR CERTIFICADO'
  }

  /**
   * In production, replace this with a real fetch to your backend:
   *   const res = await fetch(`/verify/${torneoId}/${code}`)
   *   return res.json()
   *
   * For demo purposes, this simulates the backend response.
   */
  async function fetchVerification(torneoId, code) {
    // DEMO: simulate network delay
    await new Promise(r => setTimeout(r, 700))

    // DEMO: hardcoded known certificate for testing
    const DEMO_CERTS = {
      'abc1-9f3d': { code: '7342', winnerName: 'El_Matador', chipsWon: 12500, totalPlayers: 8, date: new Date().toISOString() },
      'test-torneo': { code: '1234', winnerName: 'PokerFace_Bot', chipsWon: 5000, totalPlayers: 4, date: new Date(Date.now() - 86400000).toISOString() },
    }

    const cert = DEMO_CERTS[torneoId]
    if (!cert) return { valid: false, error: 'Torneo no encontrado.' }
    if (cert.code !== code) return { valid: false, error: 'Código incorrecto.' }

    return {
      valid: true,
      certificate: {
        torneoId,
        winnerName: cert.winnerName,
        chipsWon: cert.chipsWon,
        totalPlayers: cert.totalPlayers,
        date: cert.date,
      }
    }

    // ─── REAL PRODUCTION CODE ────────────────────────
    // const res = await fetch(`/verify/${torneoId}/${code}`)
    // if (!res.ok) throw new Error('Server error')
    // return res.json()
  }

  function showResult(result, torneoId, code) {
    const panel = document.getElementById('resultPanel')
    const inputCard = document.getElementById('inputCard')

    panel.className = 'result-panel ' + (result.valid ? 'valid' : 'invalid')
    panel.style.display = 'block'

    document.getElementById('resultIcon').textContent = result.valid ? '✅' : '❌'
    document.getElementById('resultStatus').textContent = result.valid
      ? 'CERTIFICADO VÁLIDO'
      : 'CERTIFICADO INVÁLIDO'

    document.getElementById('resultMsg').textContent = result.valid
      ? 'Este código ha sido verificado exitosamente. El jugador es el ganador oficial de este torneo.'
      : (result.error || 'El código no corresponde al ganador de este torneo.')

    if (result.valid && result.certificate) {
      const cert = result.certificate
      document.getElementById('rName').textContent = (cert.winnerName || '?').toUpperCase()
      document.getElementById('rTorneo').textContent = cert.torneoId || torneoId
      document.getElementById('rPlayers').textContent = (cert.totalPlayers || '?') + ' jugadores'
      document.getElementById('rChips').textContent = (cert.chipsWon || 0).toLocaleString() + ' chips'

      const d = cert.date ? new Date(cert.date) : new Date()
      document.getElementById('rDate').textContent =
        d.toLocaleDateString('es-ES', { day:'2-digit', month:'long', year:'numeric' })

      document.getElementById('winnerDetail').style.display = 'grid'
      document.getElementById('sealWrap').innerHTML = `
        <div class="seal">
          <div class="seal-dot"></div>
          VERIFICADO POR DEUSH POKER
        </div>
      `
    } else {
      document.getElementById('winnerDetail').style.display = 'none'
      document.getElementById('sealWrap').innerHTML = ''
    }

    document.getElementById('tryAgainBtn').style.display = 'inline-block'

    // Smooth scroll to result
    setTimeout(() => panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 100)
  }

  function reset() {
    const panel = document.getElementById('resultPanel')
    panel.className = 'result-panel'
    panel.style.display = 'none'
    digits.forEach(d => { d.value = ''; d.classList.remove('filled') })
    document.getElementById('torneoInput').value = ''
    document.getElementById('torneoInput').focus()
  }

  function shake(el) {
    el.style.animation = 'none'
    el.offsetHeight
    el.style.animation = 'shake 0.35s ease'
    el.style.borderColor = 'rgba(192,57,43,0.7)'
    setTimeout(() => {
      el.style.animation = ''
      el.style.borderColor = ''
    }, 400)
  }

  // Add shake animation
  const style = document.createElement('style')
  style.textContent = `
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }
  `
  document.head.appendChild(style)

  // Auto-fill from URL params: /verify/torneoId/code
  const path = window.location.pathname.split('/')
  if (path[1] === 'verify' && path[2] && path[3]) {
    document.getElementById('torneoInput').value = path[2]
    const code = path[3].padStart(4,'0')
    digits.forEach((d,i) => { d.value = code[i] || ''; d.classList.toggle('filled', !!code[i]) })
    setTimeout(verify, 300)
  }
</script>
</body>
</html>
